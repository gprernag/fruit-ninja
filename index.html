<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fruit Ninja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe — must be in this exact order -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- ONE canvas — everything is drawn here -->
  <canvas id="gameCanvas"></canvas>

  <!-- Hidden video — webcam feeds into this, never shown directly -->
  <video id="webcam" style="display:none" playsinline></video>

  <!-- Score + Lives overlay (outside canvas, not affected by canvas flip) -->
  <div id="ui">
    <span id="score">Score: 0</span>
    <span id="lives">❤️❤️❤️</span>
  </div>

  <!-- Restart button (hidden until game over) -->
  <button id="restartBtn" style="display:none">Play Again</button>

  <script src="game.js"></script>
</body>
</html>
